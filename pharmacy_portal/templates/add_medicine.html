{% extends "base.html" %}
{% block title %}Add Medicine{% endblock %}

{% block content %}
<div class="p-8">
    <div class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Add Medicine</h1>
            <p class="text-gray-500 mt-2">Scan barcode or manually enter medicine details to sync with patient app.</p>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 max-w-4xl">
        <form action="{{ url_for('add_medicine') }}" method="POST" class="space-y-6">

            <!-- Patient Connection Section -->
            <div class="pb-6 border-b border-gray-100">
                <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                    <span
                        class="w-6 h-6 rounded bg-blue-100 text-blue-600 flex items-center justify-center text-sm mr-2">1</span>
                    Patient Info
                </h3>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Customer Phone Number (e.g.,
                        +91...)</label>
                    <input type="tel" name="customer_phone" required placeholder="+919876543210"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-gray-50 focus:bg-white text-lg font-medium">
                    <p class="text-xs text-gray-400 mt-2">This phone number MUST be registered on the mobile app.</p>
                </div>
            </div>

            <!-- Medicine Section -->
            <div class="pt-2">
                <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                    <span
                        class="w-6 h-6 rounded bg-blue-100 text-blue-600 flex items-center justify-center text-sm mr-2">2</span>
                    Medicine Details
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Medicine Name (Scan Barcode
                            Here)</label>
                        <input type="text" name="medicine_name" required autofocus placeholder="Amoxicillin 500mg"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-gray-50 focus:bg-white text-lg font-medium">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Batch Number</label>
                        <input type="text" name="batch_number" required placeholder="BAT-XX902"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-gray-50 focus:bg-white">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Use Case / Purpose</label>
                        <input type="text" name="use_case" required placeholder="Bacterial Infection"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-gray-50 focus:bg-white">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Manufacturing Date</label>
                        <input type="date" name="manufactured_date" required
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-gray-50 focus:bg-white text-gray-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Expiry Date</label>
                        <input type="date" name="expiry_date" required
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-gray-50 focus:bg-white text-gray-500">
                    </div>
                </div>
            </div>

            <div class="pt-6">
                <button type="submit"
                    class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition-all hover:shadow-lg text-lg flex justify-center items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    Add Medicine & Sync
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

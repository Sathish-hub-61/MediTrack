{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-10">
    <div class="max-w-md w-full bg-slate-900 rounded-2xl shadow-2xl overflow-hidden p-8 border border-slate-700">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-white mb-2 mt-4">System Admin</h1>
            <p class="text-slate-400 text-sm">Log in to manage network</p>
        </div>

        <form action="{{ url_for('admin_login') }}" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Admin Username</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-slate-800 text-white placeholder-slate-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-slate-800 text-white placeholder-slate-500">
            </div>

            <button type="submit"
                class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl shadow-md transition-all mt-4">
                Access Panel
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="{{ url_for('login') }}" class="text-sm text-slate-500 hover:text-white">Return to Pharmacy
                Login</a>
        </div>
    </div>
</div>
{% endblock %}

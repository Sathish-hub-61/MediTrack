{% extends "base.html" %}
{% block title %}Pharmacy Login{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-10">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 p-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 mb-2 mt-4">Welcome Back</h1>
            <p class="text-gray-500 text-sm">Sign in to your pharmacy portal</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-gray-50 focus:bg-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-gray-50 focus:bg-white">
            </div>

            <button type="submit"
                class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl shadow-md transition-all mt-4 hover:shadow-lg">
                Log In
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="{{ url_for('admin_login') }}" class="text-sm text-gray-400 hover:text-blue-500">Admin Login
                Instead?</a>
        </div>
    </div>
</div>
{% endblock %}

name: meditrack
description: A new Flutter project.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:       # CRITICAL: Required for every Flutter project - DO NOT REMOVE
    sdk: flutter # CRITICAL: Required for every Flutter project - DO NOT REMOVE
  

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # State Management
  provider: ^6.1.1

  # UI & Assets
  sizer: ^2.0.15
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  
  # Utilities
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  connectivity_plus: ^5.0.2
  timeago: ^3.6.1
  uuid: ^4.5.2

  # Networking
  dio: ^5.4.1

  # UI Components
  fluttertoast: ^8.2.4
  fl_chart: ^0.66.2
  share_plus: ^7.2.2
  flutter_slidable: ^3.0.1
  pin_code_fields: ^8.0.1
  url_launcher: ^6.2.5

  # Date
  intl: ^0.19.0
  path: ^1.9.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  intl_phone_field: ^3.2.0

  # AI Assistant
  google_generative_ai: ^0.4.3
  flutter_dotenv: ^5.1.0
  flutter_markdown: ^0.7.1

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#F8FAF9"
    theme_color: "#00695C"

flutter:
  uses-material-design: true # CRITICAL: Required for Material icon font - DO NOT REMOVE
  assets:
    - assets/
    - assets/images/
    - .env
  # CRITICAL ASSET MANAGEMENT RULES:
  # - DO NOT ADD NEW ASSET DIRECTORIES (assets/svg/, assets/icons/, etc.)
  # - ONLY USE EXISTING AND ITEMS AVAILABLE IN THE DIRECTORIES LISTED ABOVE (assets/, assets/images/)
  
  # CRITICAL FONTS RULE: 
  # - THIS PROJECT USES GOOGLE FONTS INSTEAD OF LOCAL FONTS
  # - DO NOT ADD ANY LOCAL FONTS SECTION OR FONT FILES
